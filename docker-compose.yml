services:

  backend:
    build: ./app/backend
    environment:
      - REDIS_URL=redis://redis:6379
      - APP_VERSION=1.0.0
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./app/frontend/index.html:/usr/share/nginx/html/index.html
      - ./app/frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
